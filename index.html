<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WHOlog — Adivina Quién</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo">
    <div>
      <div class="logo-text"><span class="accent">WHO</span><span class="accent2">log</span></div>
      <div class="logo-sub">prolog · heroes · inference</div>
    </div>
  </div>
  <div class="header-right">
    <span class="badge" id="status-badge">⬤ offline</span>
    <button class="theme-toggle" id="themeBtn" title="Cambiar tema">
      <span id="themeIcon">☀</span> <span id="themeLabel">Claro</span>
    </button>
  </div>
</header>

<div class="layout">

  <!-- ── Panel juego ── -->
  <div class="panel-game">

    <div id="error-msg"></div>

    <!-- Pregunta principal -->
    <div class="question-card" id="question-card">
      <div class="q-label">
        <span class="q-label-text" id="q-label-text">▶ prolog sugiere preguntar</span>
        <span id="spinner" class="spinner" style="display:none"></span>
      </div>
      <div class="q-text" id="q-text">Cargando...</div>
      <div class="q-score" id="q-score"></div>
      <div class="answer-btns" id="answer-btns">
        <button class="answer-btn no" id="btn-no" disabled>NO</button>
        <button class="answer-btn si" id="btn-si" disabled>SÍ</button>
      </div>
    </div>

    <!-- Stats + reset -->
    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-dot green"></span>
        <span class="stat-num" id="cnt-activos">—</span>
        <span style="color:var(--text-muted)">activos</span>
      </div>
      <div class="stat-item">
        <span class="stat-dot red"></span>
        <span class="stat-num" id="cnt-descartados">—</span>
        <span style="color:var(--text-muted)">descartados</span>
      </div>
      <button class="reset-btn" id="resetBtn">↺ reset</button>
    </div>

    <!-- Historial de respuestas -->
    <div class="history-bar" id="history-bar" style="display:none">
      <span class="history-label">// historial</span>
      <div class="history-list" id="history-list"></div>
    </div>

    <!-- Personajes activos -->
    <div class="card">
      <div class="card-header">
        <span class="card-title" style="color:var(--green)">▶ en juego</span>
      </div>
      <div class="chars-grid" id="lista-activos"></div>
    </div>

    <!-- Personajes descartados -->
    <div class="card">
      <div class="card-header">
        <span class="card-title" style="color:var(--red)">✕ descartados</span>
      </div>
      <div class="chars-grid" id="lista-descartados"></div>
    </div>

  </div>

  <!-- ── Panel terminal Prolog ── -->
  <div class="panel-terminal">
    <div class="terminal-header">
      <div class="terminal-dots">
        <div class="dot dot-red"></div>
        <div class="dot dot-yellow"></div>
        <div class="dot dot-green"></div>
      </div>
      <span class="terminal-title">SWI-PROLOG — wholog/base.pl</span>
    </div>
    <div class="terminal-body" id="terminal-body">
      <span class="tline tline-muted">% WHOlog inference engine loaded</span>
      <span class="tline tline-muted">% 28 facts · 10 attributes · scoring active</span>
      <span class="tline tline-sep">────────────────────────────────</span>
      <span class="tline">&nbsp;</span>
    </div>
  </div>

</div>

<script>
const API = 'http://localhost:3001';
let historial  = []; // [{atributo, valor, positivo}]
let mejorPregunta = null;
let queryCount = 0;

const POS_MAP = {
  universo: 2, mascara: 3, capa: 4, armas: 5,
  vuela: 6, humano: 7, genero: 8, equipo: 9,
  poder: 10, habitat: 11,
};

const ATTR_LABEL = {
  universo: 'universo', mascara: 'máscara', capa: 'capa',
  armas: 'armas', vuela: 'vuela', humano: 'es humano',
  genero: 'género', equipo: 'equipo', poder: 'tipo de poder', habitat: 'hábitat',
};

const VAL_LABEL = {
  dc: 'DC', marvel: 'Marvel',
  masc: 'masculino', fem: 'femenino',
  vengadores: 'Vengadores', liga_justicia: 'Liga de la Justicia',
  x_men: 'X-Men', j_titanes: 'Jóvenes Titanes',
  escuadron_s: 'Escuadrón Suicida', independiente: 'Independiente',
  fisico: 'físico', tecnologico: 'tecnológico', cosmico: 'cósmico',
  elemental: 'elemental', magico: 'mágico',
  urbano: 'urbano', espacio: 'espacio', oceano: 'océano', dimension: 'dimensión',
  true: 'sí', false: 'no',
};

// ── Tema ──────────────────────────────────────────────────
document.getElementById('themeBtn').addEventListener('click', () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeIcon').textContent = isDark ? '☾' : '☀';
  document.getElementById('themeLabel').textContent = isDark ? 'Oscuro' : 'Claro';
});

// ── Terminal ──────────────────────────────────────────────
const termBody = document.getElementById('terminal-body');

function termLine(html, cls = 'tline-out') {
  const s = document.createElement('span');
  s.className = `tline ${cls}`;
  s.innerHTML = html;
  termBody.appendChild(s);
  termBody.scrollTop = termBody.scrollHeight;
}

function termSep() { termLine('────────────────────────────────', 'tline-sep'); }

function termQuery(rest) {
  queryCount++;
  termSep();
  termLine(`<span class="tline-muted">% query #${queryCount} · ${new Date().toLocaleTimeString()}</span>`);
  const prologList = buildPrologStr(rest);
  termLine(`<span class="tline-prompt">?- </span><span class="tline-cmd">estado_json(${escHtml(prologList)}).</span>`);
  if (rest.length > 0) {
    termLine(`<span class="tline-muted">%  restricciones:</span>`);
    rest.forEach(r => {
      const fn = r.positivo === false ? 'not_attr' : 'attr';
      termLine(`<span class="tline-muted">%    </span><span class="tline-key">${fn}(${POS_MAP[r.atributo]},${r.valor})</span>`);
    });
  }
}

function termResult(estado) {
  const mp = estado.mejor_pregunta;
  termLine(`<span class="tline-key">  activos</span><span class="tline-muted"> = </span><span class="tline-val">${estado.total_activos}</span>`);
  termLine(`<span class="tline-key">  descartados</span><span class="tline-muted"> = </span><span class="tline-val">${estado.total_descartados}</span>`);
  if (mp && mp.atributo !== 'null') {
    termLine(`<span class="tline-key">  mejor_pregunta</span><span class="tline-muted"> = </span><span class="tline-val">${mp.atributo}/${mp.valor}</span><span class="tline-muted"> (${parseFloat(mp.puntaje).toFixed(2)})</span>`);
  }
  termLine(`<span class="tline-prompt">true.</span>`);
}

function termAnswer(atributo, valor, positivo) {
  const op = positivo ? '=' : '≠';
  const sign = positivo ? '✓' : '✗';
  termLine(`<span class="tline-muted">% respuesta: ${sign} </span><span class="tline-key">${atributo}</span><span class="tline-muted"> ${op} </span><span class="tline-val">${valor}</span>`);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildPrologStr(rest) {
  const terms = rest.map(r => {
    const fn = r.positivo === false ? 'not_attr' : 'attr';
    return `${fn}(${POS_MAP[r.atributo]},${r.valor})`;
  });
  return `[${terms.join(',')}]`;
}

// ── API ───────────────────────────────────────────────────
async function fetchEstado(rest) {
  const r = await fetch(`${API}/estado`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ restricciones: rest }),
  });
  return r.json();
}

// ── Responder ─────────────────────────────────────────────
function responder(positivo) {
  if (!mejorPregunta || mejorPregunta.atributo === 'null') return;
  termAnswer(mejorPregunta.atributo, mejorPregunta.valor, positivo);
  historial.push({ atributo: mejorPregunta.atributo, valor: mejorPregunta.valor, positivo });
  renderHistorial();
  actualizarEstado();
}

document.getElementById('btn-si').addEventListener('click', () => responder(true));
document.getElementById('btn-no').addEventListener('click', () => responder(false));

// ── Historial ─────────────────────────────────────────────
function renderHistorial() {
  const bar = document.getElementById('history-bar');
  const list = document.getElementById('history-list');
  if (historial.length === 0) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  list.innerHTML = historial.map(h => {
    const cls = h.positivo ? 'si' : 'no';
    const sign = h.positivo ? '✓' : '✗';
    const op = h.positivo ? '=' : '≠';
    const aLbl = ATTR_LABEL[h.atributo] || h.atributo;
    const vLbl = VAL_LABEL[h.valor] || h.valor;
    return `<span class="history-item ${cls}">${sign} ${aLbl} ${op} ${vLbl}</span>`;
  }).join('');
}

// ── Actualizar estado ─────────────────────────────────────
async function actualizarEstado() {
  const spinner   = document.getElementById('spinner');
  const errorMsg  = document.getElementById('error-msg');
  const btnSi     = document.getElementById('btn-si');
  const btnNo     = document.getElementById('btn-no');
  const answerBtns = document.getElementById('answer-btns');
  const qLabelText = document.getElementById('q-label-text');

  spinner.style.display = 'inline-block';
  btnSi.disabled = true;
  btnNo.disabled = true;
  errorMsg.classList.remove('visible');

  const rest = historial.map(h => ({ atributo: h.atributo, valor: h.valor, positivo: h.positivo }));
  termQuery(rest);

  try {
    const estado = await fetchEstado(rest);
    if (estado.error) throw new Error(estado.error);

    termResult(estado);
    renderPersonajes(estado.activos || [], estado.descartados || []);
    document.getElementById('cnt-activos').textContent    = estado.total_activos ?? 0;
    document.getElementById('cnt-descartados').textContent = estado.total_descartados ?? 0;

    const mp      = estado.mejor_pregunta;
    const qText   = document.getElementById('q-text');
    const qScore  = document.getElementById('q-score');

    if (estado.total_activos === 1) {
      qLabelText.textContent = '⚡ resultado';
      qText.innerHTML = `<span class="q-found">Es <span class="q-name">${estado.activos[0]}</span></span>`;
      qScore.textContent = `identificado en ${historial.length} pregunta${historial.length !== 1 ? 's' : ''}`;
      answerBtns.style.display = 'none';
      mejorPregunta = null;

    } else if (estado.total_activos === 0) {
      qLabelText.textContent = '✕ sin coincidencias';
      qText.innerHTML = `<span class="q-found q-error">Ningún personaje coincide</span>`;
      qScore.textContent = 'Revisa las respuestas o reinicia.';
      answerBtns.style.display = 'none';
      mejorPregunta = null;

    } else if (!mp || mp.atributo === 'null') {
      qLabelText.textContent = '? candidatos finales';
      qText.innerHTML = `<span class="q-found">Quedan ${estado.total_activos} posibles</span>`;
      qScore.textContent = 'No hay más preguntas discriminantes.';
      answerBtns.style.display = 'none';
      mejorPregunta = null;

    } else {
      mejorPregunta = mp;
      const aLbl = ATTR_LABEL[mp.atributo] || mp.atributo;
      const vLbl = VAL_LABEL[mp.valor]     || mp.valor;
      qLabelText.textContent = '▶ prolog sugiere preguntar';
      qText.innerHTML = `<span class="q-mono">¿</span><span class="q-attr">${aLbl}</span><span class="q-mono"> = </span><span class="q-val">${vLbl}</span><span class="q-mono"> ?</span>`;
      qScore.textContent = `puntaje: ${parseFloat(mp.puntaje).toFixed(2)} · elimina ~${Math.floor(estado.total_activos / 2)} personajes`;
      answerBtns.style.display = 'flex';
      btnSi.disabled = false;
      btnNo.disabled = false;
    }

    document.getElementById('status-badge').textContent = '⬤ online';
    document.getElementById('status-badge').style.color = 'var(--green)';

  } catch (e) {
    termLine(`<span class="tline-error">ERROR: ${escHtml(e.message)}</span>`);
    errorMsg.textContent = `API error: ${e.message} — ¿Está corriendo node server.js?`;
    errorMsg.classList.add('visible');
    document.getElementById('status-badge').textContent = '⬤ offline';
    document.getElementById('status-badge').style.color = 'var(--red)';
  } finally {
    spinner.style.display = 'none';
  }
}

// ── Render personajes ─────────────────────────────────────
function renderPersonajes(activos, descartados) {
  document.getElementById('lista-activos').innerHTML =
    activos.map(n => `<span class="char-tag activo">${n}</span>`).join('');
  document.getElementById('lista-descartados').innerHTML =
    descartados.map(n => `<span class="char-tag descartado">${n}</span>`).join('');
}

// ── Reset ─────────────────────────────────────────────────
document.getElementById('resetBtn').addEventListener('click', () => {
  historial = [];
  mejorPregunta = null;
  renderHistorial();
  document.getElementById('answer-btns').style.display = 'flex';
  termLine(`<span class="tline-muted">% ↺ sesión reiniciada</span>`);
  actualizarEstado();
});

// ── Init ──────────────────────────────────────────────────
async function init() {
  const errorMsg = document.getElementById('error-msg');
  try {
    termLine(`<span class="tline-prompt">?- </span><span class="tline-cmd">use_module(library(lists)), consult('base.pl').</span>`);
    const r = await fetch(`${API}/atributos`);
    const d = await r.json();
    termLine(`<span class="tline-val">true.</span>`);
    termLine(`<span class="tline-muted">% atributos: ${d.atributos.map(a => a.nombre).join(', ')}</span>`);
    await actualizarEstado();
  } catch (e) {
    termLine(`<span class="tline-error">ERROR: ${escHtml(e.message)}</span>`);
    errorMsg.textContent = `No se pudo conectar con la API — ejecuta: node server.js`;
    errorMsg.classList.add('visible');
  }
}

init();
</script>
</body>
</html>
